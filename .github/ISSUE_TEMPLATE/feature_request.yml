name: Feature request
description: Suggest an improvement or new capability
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Use this template for product, UX, deployment, monitoring, or developer-experience improvements.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What limitation or workflow pain does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior you want.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Monitoring
        - Notifications
        - Dashboard UI
        - Auth/users
        - Deployment
        - Tests/quality
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional, but useful for larger changes.
